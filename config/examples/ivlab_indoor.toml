# IVLab indoor — manual lamp mode (indoor light sources, no solar simulator)
# Hardware: manual lamp + Keithley 2602 SMU

[computer]
hardware = "why! PC"
os = "Windows 10"
basePath = "E:\\data\\IVlab"
sdPath = "E:\\data\\sd"

[IVsys]
sysName = "IVLab"
fullSunReferenceCurrent = 1.6        # placeholder — update after first calibration
calibrationDateTime = "Mon Jan 01 00:00:00 1900"
referenceDiodeImax = 0.005
saveDataAutomatic = false
checkVOCBeforeScan = true
firstPointDwellTime = 5.0
MPPVoltageStepInitial = 0.002
MPPVoltageStepMax = 0.002
MPPVoltageStepMin = 0.001

# Calibration (control) diodes offered in the calibration panel drop-down.
# Keys = name shown in the dropdown; values = certified Iref in mA.
# Pick "Manual value" in the GUI to type an Iref by hand instead.
[IVsys.calibrationDiodes]
"Si1812" = 1.541

[lamp]
# Manual lamp: no hardware control — user adjusts light level physically.
brand = "manual"
model = "manual"
emulate = false

[SMU]
brand = "Keithley"
model = "2602"
visa_address = "GPIB0::24::INSTR"
visa_library = "C:\\Windows\\System32\\visa32.dll"
emulate = false
referenceDiodeSenseMode = "2wire"
autorange = true
useReferenceDiode = true
