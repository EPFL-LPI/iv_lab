# Dell Precision — portable laptop setup, manual lamp, Keithley 2401 SMU
# Used for indoor / low-light measurements without a solar simulator.

[computer]
hardware = "Dell Precision 3580"
os = "Windows 11"
basePath = "C:\\Users\\dreickem\\switchdrive\\Work\\Python\\Laboratory\\Optoelectronics_lab\\iv_lab_data\\data"
sdPath = "C:\\Users\\dreickem\\switchdrive\\Work\\Python\\Laboratory\\Optoelectronics_lab\\iv_lab_data\\sd"

[IVsys]
sysName = "IVLab"
fullSunReferenceCurrent = 0.006318
calibrationDateTime = "Wed Jun  8 16:07:18 2022"
referenceDiodeImax = 0.005
saveDataAutomatic = false
checkVOCBeforeScan = true
firstPointDwellTime = 5.0
MPPVoltageStepInitial = 0.002
MPPVoltageStepMax = 0.002
MPPVoltageStepMin = 0.001

# Calibration (control) diodes offered in the calibration panel drop-down.
# Keys = name shown in the dropdown; values = certified Iref in mA.
# Pick "Manual value" in the GUI to type an Iref by hand instead.
[IVsys.calibrationDiodes]
"Si1812" = 1.541

[lamp]
brand = "manual"
model = "manual"
emulate = false

[SMU]
brand = "Keithley"
model = "2401"                       # 2401 uses the same pymeasure driver as 2400
visa_address = ""                    # set to actual VISA address when connected
visa_library = "/Library/Frameworks/VISA.framework/Versions/A/Headers/visa.h"
emulate = false
referenceDiodeSenseMode = "2wire"
autorange = true
useReferenceDiode = false            # no reference diode on this setup
